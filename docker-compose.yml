services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      # Initialize the replica set on first run; create the estimate-renting DB so it appears in MongoDB tools.
      # Host must be "mongo:27017" so the API container can use the replica set.
      test: ["CMD", "mongosh", "--port", "27017", "--quiet", "--eval", "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }; var d = db.getSiblingDB('estimate-renting'); if (d.getCollectionNames().length === 0) d.createCollection('_init');"]
      interval: 5s
      timeout: 30s
      start_period: 10s
      retries: 30

  api:
    build:
      context: .
      dockerfile: src/GtMotive.Estimate.Microservice.Host/Dockerfile
    ports:
      - "8080:80"
    environment:
      MongoDb__ConnectionString: "mongodb://mongo:27017"
      MongoDb__MongoDbDatabaseName: "estimate-renting"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:80"
      # Align with URLS to avoid the warning "Overriding HTTP_PORTS '8080'" (Docker injects 8080 via port mapping)
      HTTP_PORTS: "80"
      HTTPS_PORTS: ""
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  mongo_config:
